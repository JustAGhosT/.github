name: Bug Report
description: Something isn’t working
labels: bug
body:
- type: markdown
  attributes:
    value: |
      Thanks for reporting! Please fill the checklist.
- type: textarea
  attributes:
    label: What happened?
- type: textarea
  attributes:
    label: Steps to reproduce
    placeholder: 1. Go to … 2. Click … 3. Boom
- type: input
  attributes:
    label: Browser / CLI version
- type: dropdown
  attributes:
    label: Severity
    options: [blocker, high, medium, low]
